name: Deploy Frontend

on:
  push:
    branches: [main, production]
    paths:
      - 'sowwwl-front/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean (rsync over ssh)
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y rsync openssh-client

          BUILD_ID="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '{"id":"%s","time":"%s"}\n' "$BUILD_ID" "$BUILD_TIME" > sowwwl-front/o.build.json

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DO_SSH_KEY}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${DO_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" 'set -euo pipefail; sudo mkdir -p /var/www/sowwwl-front'
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy" sowwwl-front/ "${DO_USER}@${DO_HOST}:/var/www/sowwwl-front/"
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" 'set -euo pipefail; sudo chmod -R a+rX /var/www/sowwwl-front'

          # Verify build marker is present on disk and served by Caddy.
          PRIMARY_HOST="sowwwl.com"
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            "set -euo pipefail
             test -f /var/www/sowwwl-front/o.build.json
             grep -q '\"id\":\"${BUILD_ID}\"' /var/www/sowwwl-front/o.build.json
             curl -fsS --resolve '${PRIMARY_HOST}:443:127.0.0.1' 'https://${PRIMARY_HOST}/o.build.json' | grep -q '\"id\":\"${BUILD_ID}\"'"
