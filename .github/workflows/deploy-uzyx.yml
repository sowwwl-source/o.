name: Deploy Uzyx (O signals)

on:
  push:
    branches: [main, production]
    paths:
      - 'uzyx-app/**'
      - '.github/workflows/deploy-uzyx.yml'
      - 'scripts/ensure-apache-o-site.sh'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: uzyx-app/package-lock.json

      - name: Install + build
        run: |
          set -euo pipefail
          cd uzyx-app
          npm ci
          export VITE_BUILD_ID="${GITHUB_SHA::7}"
          export VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          npm run build
          printf '{"id":"%s","time":"%s"}\n' "$VITE_BUILD_ID" "$VITE_BUILD_TIME" > dist/o.build.json
          # Expose built asset names for post-deploy verification on the droplet.
          JS="$(ls -1 dist/assets/*.js | head -n 1 | xargs -n1 basename)"
          CSS="$(ls -1 dist/assets/*.css | head -n 1 | xargs -n1 basename)"
          test -n "${JS}" && test -n "${CSS}"
          {
            echo "O_UZYX_ASSET_JS=${JS}"
            echo "O_UZYX_ASSET_CSS=${CSS}"
          } >> "${GITHUB_ENV}"

      - name: Deploy to DigitalOcean (rsync over ssh)
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y rsync openssh-client

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DO_SSH_KEY}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${DO_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Ensure directories exist (and keep /var/www/o/signals reserved for server-side drops).
          # NOTE: Some deploy users don't have passwordless sudo. Avoid failing the deploy just for that.
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail
             if [ "$(id -u)" -eq 0 ]; then SUDO=""; elif sudo -n true 2>/dev/null; then SUDO="sudo -n"; else SUDO=""; fi
             if [ -n "$SUDO" ] || [ "$(id -u)" -eq 0 ]; then
               $SUDO mkdir -p /var/www/o /var/www/o/signals
               $SUDO chown -R www-data:www-data /var/www/o/signals || true
             else
               mkdir -p /var/www/o /var/www/o/signals 2>/dev/null || true
             fi'

          # Deploy uzyx-app build output to /var/www/o (do not touch signals/)
          rsync -az --delete --exclude "signals/" -e "ssh -i ~/.ssh/id_deploy" uzyx-app/dist/ "${DO_USER}@${DO_HOST}:/var/www/o/"

          # If Apache is actively serving this host, keep its vhost in sync.
          # On Caddy-only droplets, skip this step to avoid false deploy failures.
          scp -i ~/.ssh/id_deploy scripts/ensure-apache-o-site.sh "${DO_USER}@${DO_HOST}:/tmp/ensure-apache-o-site.sh"
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail
             run_apache_fix=0
             if command -v apache2ctl >/dev/null 2>&1; then
               if systemctl is-active --quiet apache2; then
                 run_apache_fix=1
               elif [ "$(id -u)" -ne 0 ] && sudo -n systemctl is-active --quiet apache2 2>/dev/null; then
                 run_apache_fix=1
               fi
             fi
             if [ "$run_apache_fix" = "1" ]; then
               if [ "$(id -u)" -eq 0 ]; then
                 bash /tmp/ensure-apache-o-site.sh
               elif sudo -n true 2>/dev/null; then
                 sudo -n bash /tmp/ensure-apache-o-site.sh
               else
                 echo "SKIP ensure-apache-o-site.sh (no sudo)"
               fi
             else
               echo "SKIP ensure-apache-o-site.sh (apache not active)"
             fi'

          # Debug (visible in Actions logs): web stack + API reachability.
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail
             if [ "$(id -u)" -eq 0 ]; then SUDO=""; elif sudo -n true 2>/dev/null; then SUDO="sudo -n"; else SUDO=""; fi
             echo "web stack:"
             if command -v caddy >/dev/null 2>&1; then
               echo "caddy: present"
               (systemctl is-active caddy 2>/dev/null || true)
             else
               echo "caddy: absent"
             fi
             if command -v apache2ctl >/dev/null 2>&1 && { systemctl is-active --quiet apache2 2>/dev/null || ([ -n "$SUDO" ] && $SUDO systemctl is-active --quiet apache2 2>/dev/null); }; then
               echo "apache vhosts:"
               ${SUDO:+$SUDO }apache2ctl -S | sed -n "1,140p"
             else
               echo "apache: absent or inactive"
             fi
             echo
             echo "api health:"
             (curl -fsS http://127.0.0.1:8000/health | head -c 180 || echo "API_UNREACHABLE")
             echo'

          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail
             if [ "$(id -u)" -eq 0 ]; then SUDO=""; elif sudo -n true 2>/dev/null; then SUDO="sudo -n"; else SUDO=""; fi
             if [ -n "$SUDO" ] || [ "$(id -u)" -eq 0 ]; then
               $SUDO chmod -R a+rX /var/www/o
               $SUDO chown -R www-data:www-data /var/www/o/signals || true
             else
               chmod -R a+rX /var/www/o 2>/dev/null || true
             fi
             echo "o.build:"
             cat /var/www/o/o.build.json 2>/dev/null || echo "{}"
             ls -la /var/www/o/index.html 2>/dev/null || true'

          # Verify that Apache serves real static assets (not SPA HTML fallback).
          PRIMARY_HOST="0.user.o.sowwwl.cloud"
          JS="${O_UZYX_ASSET_JS}"
          CSS="${O_UZYX_ASSET_CSS}"
          echo "verifying assets on droplet: ${JS} / ${CSS}"
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            "set -euo pipefail
             test -f /var/www/o/o.build.json
             grep -q '\"id\":\"${GITHUB_SHA::7}\"' /var/www/o/o.build.json
             H=\$(curl -fsSI --resolve '${PRIMARY_HOST}:443:127.0.0.1' \"https://${PRIMARY_HOST}/assets/${JS}\" | tr -d '\\r')
             echo \"\$H\" | head -n 1 | grep -q ' 200 '
             echo \"\$H\" | grep -qi '^content-type:'
             echo \"\$H\" | grep -qi '^content-type:.*javascript' || { echo 'BAD_JS_MIME' >&2; echo \"\$H\"; exit 1; }
             H=\$(curl -fsSI --resolve '${PRIMARY_HOST}:443:127.0.0.1' \"https://${PRIMARY_HOST}/assets/${CSS}\" | tr -d '\\r')
             echo \"\$H\" | head -n 1 | grep -q ' 200 '
             echo \"\$H\" | grep -qi '^content-type:'
             echo \"\$H\" | grep -qi '^content-type:.*text/css' || { echo 'BAD_CSS_MIME' >&2; echo \"\$H\"; exit 1; }"
