name: Deploy Uzyx (O signals)

on:
  push:
    branches: [main, production]
    paths:
      - 'uzyx-app/**'
      - '.github/workflows/deploy-uzyx.yml'
      - 'scripts/ensure-apache-o-site.sh'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: uzyx-app/package-lock.json

      - name: Install + build
        run: |
          set -euo pipefail
          cd uzyx-app
          npm ci
          export VITE_BUILD_ID="${GITHUB_SHA::7}"
          export VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          npm run build
          printf '{"id":"%s","time":"%s"}\n' "$VITE_BUILD_ID" "$VITE_BUILD_TIME" > dist/o.build.json

      - name: Deploy to DigitalOcean (rsync over ssh)
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y rsync openssh-client

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DO_SSH_KEY}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${DO_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Ensure directories exist (and keep /var/www/o/signals reserved for server-side drops).
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail; sudo mkdir -p /var/www/o; sudo mkdir -p /var/www/o/signals; sudo chown -R www-data:www-data /var/www/o/signals || true'

          # Deploy uzyx-app build output to /var/www/o (do not touch signals/)
          rsync -az --delete --exclude "signals/" -e "ssh -i ~/.ssh/id_deploy" uzyx-app/dist/ "${DO_USER}@${DO_HOST}:/var/www/o/"

          # Ensure Apache serves /var/www/o and proxies /api/* (avoids "site never changes" due to wrong docroot).
          scp -i ~/.ssh/id_deploy scripts/ensure-apache-o-site.sh "${DO_USER}@${DO_HOST}:/tmp/ensure-apache-o-site.sh"
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail; sudo bash /tmp/ensure-apache-o-site.sh'

          # Debug (visible in Actions logs): vhost mapping + API reachability.
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail; echo "apache vhosts:"; sudo apache2ctl -S | sed -n "1,140p"; echo; echo "api health:"; curl -sS http://127.0.0.1:8000/health | head -c 180; echo'

          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            'set -euo pipefail; sudo chmod -R a+rX /var/www/o; sudo chown -R www-data:www-data /var/www/o/signals || true; echo "o.build:"; cat /var/www/o/o.build.json 2>/dev/null || echo "{}"; ls -la /var/www/o/index.html 2>/dev/null || true'
