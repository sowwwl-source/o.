name: Deploy API

on:
  push:
    branches: [main, production]
    paths:
      - 'sowwwl-api-php/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # NOTE: This repo name ends with a dot ("o.") which is invalid in Docker image names.
  # Use a stable, valid GHCR package name instead.
  IMAGE_NAME: ${{ github.repository_owner }}/o-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sowwwl-api-php
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail

            # Ensure the server uses the latest compose files from this repo,
            # not stale copies in /opt/sowwwl.
            APP_DIR="/opt/sowwwl/app"
            # Use GITHUB_TOKEN for private repos (masked in logs).
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            REF="${{ github.ref_name }}"

            if ! command -v git >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y git
            fi

            if [ ! -d "${APP_DIR}/.git" ]; then
              rm -rf "${APP_DIR}"
              git clone --depth 1 --branch "${REF}" "${REPO_URL}" "${APP_DIR}"
            else
              git -C "${APP_DIR}" remote set-url origin "${REPO_URL}"
              git -C "${APP_DIR}" fetch --depth 1 origin "${REF}"
              git -C "${APP_DIR}" reset --hard "origin/${REF}"
            fi

            if [ ! -f /opt/sowwwl/.env ]; then
              echo "Missing /opt/sowwwl/.env (create it from /opt/sowwwl/app/.env.example)"
              exit 1
            fi

            cd "${APP_DIR}"
            GHCR_USER="${{ github.repository_owner }}"
            GHCR_TOKEN="${{ secrets.GHCR_READ_TOKEN }}"
            if [ -z "${GHCR_TOKEN}" ]; then
              GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            fi
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            if [ "$REF" = "main" ]; then TAG="latest"; else TAG="$REF"; fi
            FULL_IMAGE="${IMAGE_BASE}:${TAG}"
            docker pull "$FULL_IMAGE"
            API_IMAGE="$FULL_IMAGE" docker compose --env-file /opt/sowwwl/.env -f docker-compose.yml -f sowwwl-api-php/docker-compose.prod.yml up -d --no-build api
            docker system prune -f
