name: Deploy API

on:
  push:
    branches: [main, production]
    paths:
      - 'docker-compose.yml'
      - 'sowwwl-api-php/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # NOTE: This repo name ends with a dot ("o.") which is invalid in Docker image names.
  # Use a stable, valid GHCR package name instead.
  IMAGE_NAME: ${{ github.repository_owner }}/o-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sowwwl-api-php
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean (ssh + scp)
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Sanity check: ensure files exist in the workspace (helps debug runner issues)
          ls -la docker-compose.yml sowwwl-api-php/docker-compose.prod.yml sowwwl-api-php/schema.sql .env.example

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DO_SSH_KEY}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${DO_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Prepare directory
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" 'set -euo pipefail; sudo rm -rf /opt/sowwwl/app; sudo mkdir -p /opt/sowwwl/app/sowwwl-api-php'

          # Upload files
          scp -i ~/.ssh/id_deploy docker-compose.yml "${DO_USER}@${DO_HOST}:/opt/sowwwl/app/docker-compose.yml"
          scp -i ~/.ssh/id_deploy sowwwl-api-php/docker-compose.prod.yml "${DO_USER}@${DO_HOST}:/opt/sowwwl/app/sowwwl-api-php/docker-compose.prod.yml"
          scp -i ~/.ssh/id_deploy sowwwl-api-php/schema.sql "${DO_USER}@${DO_HOST}:/opt/sowwwl/app/sowwwl-api-php/schema.sql"
          scp -i ~/.ssh/id_deploy .env.example "${DO_USER}@${DO_HOST}:/opt/sowwwl/app/.env.example"

          # Deploy (pull + compose up)
          ssh -i ~/.ssh/id_deploy "${DO_USER}@${DO_HOST}" \
            "set -euo pipefail
             APP_DIR=/opt/sowwwl/app
             REF='${REF}'
             if [ ! -f /opt/sowwwl/.env ]; then
               echo 'Missing /opt/sowwwl/.env (create it from /opt/sowwwl/app/.env.example)'
               exit 1
             fi
             cd \"\$APP_DIR\"
             GHCR_TOKEN='${GHCR_TOKEN}'
             if [ -z \"\$GHCR_TOKEN\" ]; then GHCR_TOKEN='${GHCR_FALLBACK_TOKEN}'; fi
             echo \"\$GHCR_TOKEN\" | docker login ${REGISTRY} -u '${GHCR_USER}' --password-stdin
             IMAGE_BASE='${REGISTRY}/${IMAGE_NAME}'
             if [ \"\$REF\" = 'main' ]; then TAG='latest'; else TAG=\"\$REF\"; fi
             FULL_IMAGE=\"\$IMAGE_BASE:\$TAG\"
             docker pull \"\$FULL_IMAGE\"
             API_IMAGE=\"\$FULL_IMAGE\" docker compose --env-file /opt/sowwwl/.env -f docker-compose.yml -f sowwwl-api-php/docker-compose.prod.yml up -d --no-build

             # Apply schema migrations (idempotent: CREATE TABLE IF NOT EXISTS ...)
             docker compose --env-file /opt/sowwwl/.env -f docker-compose.yml -f sowwwl-api-php/docker-compose.prod.yml exec -T db sh -lc \
               'mysql -uroot -p\"$MYSQL_ROOT_PASSWORD\" \"$DB_NAME\" < /docker-entrypoint-initdb.d/schema.sql'
             docker system prune -f"
