<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>login — sowwwl</title>
  <style>
    :root { color-scheme: dark; }
    body{background:#000;color:#fff;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;margin:0;padding:24px}
    a, button{color:#fff}
    button{background:transparent;border:1px solid #333;padding:10px 12px;border-radius:10px;cursor:pointer}
    button:hover{border-color:#666}
    .card{border:1px solid #222;border-radius:16px;padding:16px;max-width:900px}
    input{background:#000;border:1px solid #222;color:#fff;padding:10px 12px;border-radius:10px;min-width:260px}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .muted{color:#aaa}
    pre{white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <a href="/">← accueil</a>
      <span class="muted">auth backend PHP via /api/*</span>
    </div>

    <h2>Créer un compte</h2>
    <div class="row">
      <input id="r_email" placeholder="email" autocomplete="email" />
      <input id="r_pass" placeholder="mot de passe" type="password" autocomplete="new-password" />
      <button id="btnRegister">register</button>
    </div>

    <h2>Se connecter</h2>
    <div class="row">
      <input id="l_email" placeholder="email" autocomplete="email" />
      <input id="l_pass" placeholder="mot de passe" type="password" autocomplete="current-password" />
      <button id="btnLogin">login</button>
    </div>

    <h3>Réponse</h3>
    <pre id="out">—</pre>
  </div>

  <script>
    async function api(path, payload){
      const res = await fetch('/api' + path, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        credentials: 'include',
        body: JSON.stringify(payload || {})
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(e) { data = {raw:text}; }
      return { ok: res.ok, status: res.status, data };
    }

    function show(x){ document.getElementById('out').textContent = JSON.stringify(x, null, 2); }

    document.getElementById('btnRegister').addEventListener('click', async () => {
      const email = document.getElementById('r_email').value.trim();
      const password = document.getElementById('r_pass').value;
      show(await api('/auth/register', {email, password}));
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('l_email').value.trim();
      const password = document.getElementById('l_pass').value;
      const r = await api('/auth/login', {email, password});
      show(r);
      if (r.ok) window.location.href = '/';
    });
  </script>
</body>
</html>
