<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>sowwwl — O.</title>
  <style>
    :root { color-scheme: dark; }
    body{background:#000;color:#fff;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;margin:0;padding:24px}
    a, button{color:#fff}
    button{background:transparent;border:1px solid #333;padding:10px 12px;border-radius:10px;cursor:pointer}
    button:hover{border-color:#666}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .card{border:1px solid #222;border-radius:16px;padding:16px;max-width:900px}
    input{background:#000;border:1px solid #222;color:#fff;padding:10px 12px;border-radius:10px;min-width:260px}
    .muted{color:#aaa}
    pre{white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <div class="card">
    <h1>O.</h1>
    <p class="muted">Netlify (front) → /api/* → Backend PHP (DO) → MySQL</p>

    <div class="row">
      <button id="btnMe">/me</button>
      <button id="btnLogout">logout</button>
      <a href="/login.html">login</a>
    </div>

    <h3>État</h3>
    <pre id="out">—</pre>
  </div>

  <script>
    async function api(path, opts){
      const res = await fetch('/api' + path, Object.assign({
        headers: {'Content-Type':'application/json'},
        credentials: 'include'
      }, opts || {}));
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(e) { data = {raw:text}; }
      return { ok: res.ok, status: res.status, data };
    }

    async function refresh(){
      const r = await api('/me');
      document.getElementById('out').textContent = JSON.stringify(r, null, 2);
    }

    document.getElementById('btnMe').addEventListener('click', refresh);
    document.getElementById('btnLogout').addEventListener('click', async () => {
      const r = await api('/auth/logout', {method:'POST', body: JSON.stringify({})});
      document.getElementById('out').textContent = JSON.stringify(r, null, 2);
    });

    refresh();
  </script>
</body>
</html>
