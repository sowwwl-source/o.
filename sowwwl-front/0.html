  <script>
    document.getElementById('origin').textContent = window.location.origin;

    async function j(url, opts) {
      const res = await fetch(url, Object.assign({ credentials: 'include' }, opts || {}));
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = { raw: text }; }
      return { ok: res.ok, status: res.status, data };
    }

    (async () => {
      const health = await j('/api/health');
      document.getElementById('api').textContent = health.ok ? 'ok' : `fail:${health.status}`;

      const me = await j('/api/me');
      if (!me.ok) {
        document.getElementById('me').textContent = 'guest';
        return;
      }
      const u = me.data?.user || {};
      document.getElementById('me').textContent = `${u.handle || ('o.' + (u.id || '?'))} (${u.email || '—'})`;
    })();
  </script>
  <script src="/assets/js/bicolor.js" defer></script>
