<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>0 — O.</title>
  <link rel="stylesheet" href="/assets/css/o.css" />
</head>
<body>
  <main id="o">
    <header class="row" style="justify-content:space-between;gap:18px">
      <a class="muted" href="/index.html">↩</a>
      <span class="muted">source</span>
    </header>

    <section class="card" aria-label="0">
      <h1 class="muted">0</h1>
      <p class="muted">L’endroit source : voir toutes les solutions ouvertes.</p>
      <p class="muted" style="margin-top:10px">Origin: <code id="origin">—</code></p>
      <p class="muted" style="margin-top:10px">Moi: <code id="me">—</code></p>
      <p class="muted" style="margin-top:10px">API: <code id="api">—</code></p>
    </section>

    <section class="card" aria-label="Solutions">
      <h2 class="muted">solutions</h2>
      <div id="cards" class="cards" aria-label="Cartes">—</div>
    </section>

    <section class="card" aria-label="Portes">
      <h2 class="muted">portes</h2>
      <div class="row" style="margin-top:14px">
        <a class="btn" href="/manif3st.html">manif3st</a>
        <a class="btn" href="/qu3st.html">qu3st</a>
        <a class="btn" href="/index.html">O.</a>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('origin').textContent = window.location.origin;

    async function j(url, opts) {
      const res = await fetch(url, Object.assign({ credentials: 'include' }, opts || {}));
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = { raw: text }; }
      return { ok: res.ok, status: res.status, data };
    }

    function badge(label, cls) {
      const s = document.createElement('span');
      s.className = 'badge ' + cls;
      s.textContent = label;
      return s;
    }

    function cardLink(href, title, desc, badges) {
      const a = document.createElement('a');
      a.className = 'o-card';
      a.href = href;

      const top = document.createElement('div');
      top.className = 'o-card-top';

      const h = document.createElement('h3');
      h.className = 'muted';
      h.textContent = title;

      const b = document.createElement('div');
      b.className = 'badges';
      (badges || []).forEach((x) => b.appendChild(x));

      top.appendChild(h);
      top.appendChild(b);

      const p = document.createElement('p');
      p.className = 'muted';
      p.textContent = desc;

      a.appendChild(top);
      a.appendChild(p);
      return a;
    }

    (async () => {
      const cardsRoot = document.getElementById('cards');
      cardsRoot.textContent = '';

      const health = await j('/api/health');
      document.getElementById('api').textContent = health.ok ? 'ok' : `fail:${health.status}`;

      const me = await j('/api/me');
      if (!me.ok) {
        document.getElementById('me').textContent = 'guest';
      } else {
        const u = me.data?.user || {};
        document.getElementById('me').textContent = `${u.handle || ('o.' + (u.id || '?'))} (${u.email || '—'})`;
      }

      const authed = me.ok;

      const apiBadge = health.ok ? badge('1', 'ok') : badge('0', 'off');

      // Probe bote endpoint to know if it's already deployed on the API image.
      const boteProbe = await j('/api/bote');
      const boteReady = boteProbe.status === 200 || boteProbe.status === 401;

      const cards = [
        {
          href: '/sh0re.html',
          title: '// sh0re //',
          desc: 'Arborescence des lands visibles.',
          badges: [apiBadge],
        },
        {
          href: '/li3ns.html',
          title: '// li3ns //',
          desc: 'Relier les gens (inviter / accepter / bloquer).',
          badges: [authed ? badge('1', 'ok') : badge('locked', 'lock')],
        },
        {
          href: '/m4p.html',
          title: '// m4p //',
          desc: 'Map 3D (style CNRTL) : mots → portes.',
          badges: [badge('1', 'ok')],
        },
        {
          href: '/b0te.html',
          title: '// b0té //',
          desc: 'Éditer + voir ta b0té (1 par compte).',
          badges: [
            boteReady ? badge('1', 'ok') : badge('s0o0n', 'soon'),
            authed ? null : badge('locked', 'lock'),
          ].filter(Boolean),
        },
        {
          href: '/etat.html',
          title: '// état //',
          desc: 'Diagnostic : /me, logout, chaîne front→api→db.',
          badges: [apiBadge],
        },
        {
          href: '/login.html',
          title: '// login //',
          desc: 'Créer un compte, se connecter, fixer la session.',
          badges: [badge('1', 'ok')],
        },
        {
          href: '#',
          title: '// sal00ns //',
          desc: 'Forum / discussions / groupes privés.',
          badges: [badge('s0o0n', 'soon'), badge('locked', 'lock')],
        },
        {
          href: '#',
          title: '// call //',
          desc: 'Appel / visio (pont minimal).',
          badges: [badge('s0o0n', 'soon'), badge('locked', 'lock')],
        },
        {
          href: '#',
          title: '// mail //',
          desc: 'Messages / invitations / liens signés.',
          badges: [badge('s0o0n', 'soon'), badge('locked', 'lock')],
        },
      ];

      cards.forEach((c) => cardsRoot.appendChild(cardLink(c.href, c.title, c.desc, c.badges)));
    })();
  </script>
  <script src="/assets/js/bicolor.js" defer></script>
</body>
</html>
