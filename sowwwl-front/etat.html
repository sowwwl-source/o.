<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>état — O.</title>
  <link rel="stylesheet" href="/assets/css/o.css" />
</head>
<body>
  <main id="o">
    <header>
      <h1 class="muted">// état //</h1>
      <p class="muted"><a href="/index.html">↩</a></p>
    </header>

    <section class="card" aria-label="API">
      <p class="muted">Front → /api/* → Backend PHP → MySQL</p>

      <div class="row" style="margin-top:14px">
        <button id="btnMe">/me</button>
        <button id="btnLogout">logout</button>
      </div>

      <h2 style="margin-top:22px">Réponse</h2>
      <pre id="out">—</pre>
    </section>
  </main>

  <script>
    async function api(path, opts) {
      const res = await fetch("/api" + path, Object.assign({
        headers: { "Content-Type": "application/json" },
        credentials: "include",
      }, opts || {}));

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = { raw: text }; }
      return { ok: res.ok, status: res.status, data };
    }

    async function refresh() {
      const r = await api("/me");
      document.getElementById("out").textContent = JSON.stringify(r, null, 2);
    }

    document.getElementById("btnMe").addEventListener("click", refresh);
    document.getElementById("btnLogout").addEventListener("click", async () => {
      const r = await api("/auth/logout", { method: "POST", body: JSON.stringify({}) });
      document.getElementById("out").textContent = JSON.stringify(r, null, 2);
    });

    refresh();
  </script>
  <script src="/assets/js/bicolor.js" defer></script>
</body>
</html>
