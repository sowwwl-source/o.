services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sowwwl
      MYSQL_USER: sowwwl
      MYSQL_PASSWORD: sowwwlpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sowwwl-api-php/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./sowwwl-api-php
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: sowwwl
      DB_USER: sowwwl
      DB_PASS: sowwwlpass
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(file_get_contents('http://localhost:8000/health') ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
