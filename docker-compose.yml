services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-sowwwl}
      MYSQL_USER: ${DB_USER:-sowwwl}
      MYSQL_PASSWORD: ${DB_PASS:-sowwwlpass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sowwwl-api-php/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./sowwwl-api-php
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - seeds_data:/data
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-sowwwl}
      DB_USER: ${DB_USER:-sowwwl}
      DB_PASS: ${DB_PASS:-sowwwlpass}
      SEED_ROOT: /data
      O_NETWORK_ADMINS: ${O_NETWORK_ADMINS:-}
      # Admin magic-link (optional)
      O_ADMIN_MAGIC_TTL_MIN: ${O_ADMIN_MAGIC_TTL_MIN:-}
      O_ADMIN_MAGIC_MAIL_MODE: ${O_ADMIN_MAGIC_MAIL_MODE:-}
      O_ADMIN_MAGIC_OUTBOX_DIR: ${O_ADMIN_MAGIC_OUTBOX_DIR:-}
      # SMTP (recommended in prod)
      O_ADMIN_MAGIC_SMTP_HOST: ${O_ADMIN_MAGIC_SMTP_HOST:-}
      O_ADMIN_MAGIC_SMTP_PORT: ${O_ADMIN_MAGIC_SMTP_PORT:-}
      O_ADMIN_MAGIC_SMTP_SECURE: ${O_ADMIN_MAGIC_SMTP_SECURE:-}
      O_ADMIN_MAGIC_SMTP_USER: ${O_ADMIN_MAGIC_SMTP_USER:-}
      O_ADMIN_MAGIC_SMTP_PASS: ${O_ADMIN_MAGIC_SMTP_PASS:-}
      O_ADMIN_MAGIC_SMTP_FROM: ${O_ADMIN_MAGIC_SMTP_FROM:-}
      O_ADMIN_MAGIC_SMTP_TIMEOUT_SEC: ${O_ADMIN_MAGIC_SMTP_TIMEOUT_SEC:-}
      # HTTPS API fallback (when outbound SMTP is blocked)
      O_ADMIN_MAGIC_RESEND_API_KEY: ${O_ADMIN_MAGIC_RESEND_API_KEY:-}
      O_ADMIN_MAGIC_RESEND_FROM: ${O_ADMIN_MAGIC_RESEND_FROM:-}
      O_ADMIN_MAGIC_RESEND_ENDPOINT: ${O_ADMIN_MAGIC_RESEND_ENDPOINT:-}
      O_ADMIN_MAGIC_HTTP_TIMEOUT_SEC: ${O_ADMIN_MAGIC_HTTP_TIMEOUT_SEC:-}
      O_ADMIN_MAGIC_PUBLIC_HOST: ${O_ADMIN_MAGIC_PUBLIC_HOST:-}
      O_ADMIN_MAGIC_REDIRECT: ${O_ADMIN_MAGIC_REDIRECT:-}
      O_EMAIL_HASH_SALT: ${O_EMAIL_HASH_SALT:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(file_get_contents('http://localhost:8000/health') ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
  seeds_data:
