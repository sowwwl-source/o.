server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    # Serve static files directly
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # PHP redirect aliases (keep old URLs working)
    location = /index.php    { return 301 /; }
    location = /sal00ns.php  { return 301 /sal00ns.html; }
    location = /p0sts.php    { return 301 /p0sts.html; }
    location = /x.php        { return 301 /x.html; }
    location = /botes.php    { return 301 /botes.html; }
    location ~ ^/bote\.php   { return 301 /bote.html$is_args$args; }

    # Don't serve raw data files
    location /data/ {
        deny all;
        return 404;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
